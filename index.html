<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SutrIQ - Appointment Booking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:15px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:15px;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    border:none;
    border-radius:10px;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.success{
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#888;
}
</style>
</head>

<body>

<div class="container">

    <h1>SutrIQ</h1>
    <p class="subtitle">Book Your Appointment</p>

    <form id="appointmentForm">

        <div class="form-group">
            <input type="text" id="name" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
            <input type="tel" id="phone" placeholder="Mobile Number" required>
        </div>

        <div class="form-group">
            <select id="service" required>
                <option value="">Select Service</option>
                <option>Power BI Dashboard</option>
                <option>Excel Automation</option>
                <option>MIS Reporting</option>
                <option>SQL Development</option>
                <option>Business Consulting</option>
            </select>
        </div>

        <div class="form-group">
            <textarea id="message" placeholder="Describe Your Requirement"></textarea>
        </div>

        <button type="submit">
            Book Appointment
        </button>

    </form>

    <div id="response"></div>

    <div class="footer">
        © 2026 SutrIQ | Smart Business Solutions
    </div>

</div>

<script>
document.getElementById("appointmentForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    document.getElementById("response").innerHTML =
    '<div class="success">✅ Appointment Submitted Successfully!</div>';

    this.reset();
});
</script>

</body>
</html>
