from pathlib import Path

html = r"""<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SutrIQ Appointments</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#667eea,#764ba2,#ff6b6b);min-height:100vh}
.container{max-width:900px;margin:40px auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
h1{text-align:center}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ddd}
button{background:linear-gradient(90deg,#667eea,#ff6b6b);color:#fff;border:none;font-weight:bold;cursor:pointer}
#msg{margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Book Appointment</h1>
<form id="appointmentForm">
<input name="name" placeholder="Your Name" required>
<input name="email" type="email" placeholder="Email" required>
<input name="phone" placeholder="Phone">
<select name="service" required>
<option value="">Select Service</option>
<option>Power BI</option>
<option>SQL Automation</option>
<option>MIS Setup</option>
</select>
<textarea name="requirement" placeholder="Requirement"></textarea>
<button type="submit">Submit Appointment</button>
</form>
<div id="msg"></div>
</div>

<script>
const SCRIPT_URL="PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL_HERE";

document.getElementById("appointmentForm").addEventListener("submit",async(e)=>{
e.preventDefault();
const data=Object.fromEntries(new FormData(e.target).entries());

try{
await fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
document.getElementById("msg").innerHTML="✅ Appointment submitted successfully";
e.target.reset();
}catch(err){
document.getElementById("msg").innerHTML="❌ Error submitting form";
}
});
</script>
</body>
</html>"""

out = "/mnt/data/SutrIQ_Github_Friendly_Appointment.html"
Path(out).write_text(html, encoding="utf-8")
print(out)
